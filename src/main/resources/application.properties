# MySQL Bağlantı Ayarları
spring.datasource.url=jdbc:mysql://localhost:3306/quizarena_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=YeniSifre123!

# MySQL Sürücüsü
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Sunucu
server.port=8080

# Frontend sayfalarını HTTP uzerinden servis et
spring.web.resources.static-locations=file:frontend/,classpath:/static/

# CORS
spring.web.cors.allowed-origins=*

# WebSocket
spring.websocket.buffer-limit=8192